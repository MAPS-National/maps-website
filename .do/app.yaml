# DigitalOcean App Platform spec (infra-as-code) for the MAPS website.
#
# One file, one environment. Create the stage and prod Apps from it with:
#     doctl apps create --spec .do/app.yaml
# then set the SECRET env values in the dashboard (they are intentionally not
# committed). Per-environment differences are called out inline as "PER-ENV".
#
# Validate before applying:  doctl apps spec validate .do/app.yaml
#
# Buildpack build (no Dockerfile): DO auto-detects Node from package-lock.json,
# installs deps, runs build_command, then run_command. `next start` binds $PORT
# (DO sets it to http_port), so the two must match.

name: maps-website # PER-ENV: maps-stage / maps-prod
region: nyc # pick the region closest to your users (and your Spaces bucket)

services:
  - name: web
    github:
      repo: MAPS-National/maps-website
      branch: master # PER-ENV: master for prod; a staging branch for stage
      deploy_on_push: true
    # Buildpack's auto `npm ci` omits devDependencies under NODE_ENV=production,
    # but `next build` needs them (@tailwindcss/postcss, tailwindcss, etc.), so
    # reinstall with dev deps first. postbuild (next-sitemap) runs after build.
    build_command: npm ci --include=dev && npm run build
    run_command: npm start
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-1gb # 1GB; tune down to 0.5gb if memory allows
    instance_count: 1
    health_check:
      http_path: / # home renders via homeStatic even before the DB is seeded
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      # Injected from the attached managed database (see `databases` below).
      # RUN_TIME only: the build is guarded to not need the DB (issue #147).
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # DO's managed-database CA, so the app can verify the Postgres TLS cert.
      - key: DATABASE_CA_CERT
        scope: RUN_TIME
        value: ${db.CA_CERT}
      # Public origin. BUILD too: NEXT_PUBLIC_* is inlined into the client bundle
      # and next-sitemap/robots resolve their URLs from it at build time.
      - key: NEXT_PUBLIC_SERVER_URL
        scope: RUN_AND_BUILD_TIME
        value: https://REPLACE.ondigitalocean.app # PER-ENV: real origin, no trailing slash
      # --- Secrets: set values in the dashboard after create, never commit them ---
      - key: PAYLOAD_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: PREVIEW_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: CRON_SECRET
        scope: RUN_TIME
        type: SECRET
      # --- Media: DigitalOcean Spaces (S3-compatible; forcePathStyle is already
      #     set in payload.config.ts). Leaving these unset falls back to local
      #     disk, which does NOT survive redeploys, so all five must be present. ---
      - key: S3_BUCKET
        scope: RUN_TIME
        value: REPLACE-space-name # PER-ENV
      - key: S3_ENDPOINT
        scope: RUN_TIME
        value: https://REGION.digitaloceanspaces.com # e.g. https://nyc3.digitaloceanspaces.com
      - key: S3_REGION
        scope: RUN_TIME
        value: REGION # e.g. nyc3
      - key: S3_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: S3_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      # --- Optional: transactional email (Resend). Omit these to log to console;
      #     form submissions still persist to the form-submissions collection. ---
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: EMAIL_FROM_ADDRESS
        scope: RUN_TIME
        value: no-reply@mail.mapsnational.org
      - key: EMAIL_FROM_NAME
        scope: RUN_TIME
        value: MAPS National
      # --- Optional: Google Maps (client) + reCAPTCHA v3. The NEXT_PUBLIC_* keys
      #     are inlined at build, so they need BUILD scope. ---
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RECAPTCHA_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RECAPTCHA_MIN_SCORE
        scope: RUN_TIME
        value: '0.5'

# Applies schema migrations once per deploy, before the new web release goes live.
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: MAPS-National/maps-website
      branch: master # PER-ENV: keep in sync with the web service branch
    # payload's CLI loads the TS config (payload.config.ts) via tsx, a devDependency,
    # so the job must install dev deps. If migrate fails with a TS/loader error,
    # this is the first thing to check.
    build_command: npm ci --include=dev
    run_command: npm run payload -- migrate
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      # DO's managed-database CA, so the app can verify the Postgres TLS cert.
      - key: DATABASE_CA_CERT
        scope: RUN_TIME
        value: ${db.CA_CERT}
      - key: PAYLOAD_SECRET
        scope: RUN_TIME
        type: SECRET

databases:
  - name: db
    engine: PG
    version: '16'
    # PER-ENV: stage can use a dev database (cheaper, single node). For prod,
    # attach a managed cluster with backups and set production: true.
    production: false
