# Local media-storage parity for Payload.
#
# Brings up MinIO (S3-compatible) so the same `@payloadcms/storage-s3` code path
# that runs in prod (R2/AWS) can be exercised locally. Activate by setting the
# S3_* vars in .env (see .env.example), then `docker compose up -d`.
# Without those vars Payload uses local-disk storage and this stack is optional.
#
#   S3 API     -> http://localhost:9000
#   Web console-> http://localhost:9001  (minioadmin / minioadmin)

services:
  minio:
    image: minio/minio:latest
    container_name: maps-website-images
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  # One-shot: wait for MinIO, create the bucket, and make objects public-read so
  # the media URLs Payload generates resolve without signing. Exits when done.
  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio...'; sleep 1; done;
      mc mb --ignore-existing local/payload-media;
      mc anonymous set download local/payload-media;
      echo 'bucket ready: payload-media';
      "

volumes:
  minio-data:
